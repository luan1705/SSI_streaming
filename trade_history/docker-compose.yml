# ===================== BASE CONFIG =====================
x-base: &base
  build: .
  restart: always
  environment:
    PYTHONPATH: /app
  volumes:
    - ../streaming/List:/app/List:ro
    - ../streaming/ssi_fc_data:/app/ssi_fc_data:ro

services:

  # ===================== HNX =====================
  hnx1:
    <<: *base
    container_name: trade_history_hnx1
    environment:
      PYTHONPATH: /app
      SYMBOL_NAME: HNX1

  hnx2:
    <<: *base
    container_name: trade_history_hnx2
    environment:
      PYTHONPATH: /app
      SYMBOL_NAME: HNX2

