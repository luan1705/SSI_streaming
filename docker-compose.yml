version: "3.9"

# ================== COMMON ==================
x-streaming: &streaming
  build:
    context: ./streaming
    dockerfile: Dockerfile
  image: ssi_streaming:latest
  networks: [appnet]
  restart: unless-stopped
  volumes:                           # 👈 thêm
    - ./notify.py:/app/notify.py:ro # 👈 thêm

x-table-others: &table_others
  <<: *streaming
  command: ["python3", "-u", "eboard_table/eboard_table_others.py"]

x-table-exchange: &table_exchange
  <<: *streaming
  command: ["python3", "-u", "eboard_table/eboard_table_exchange.py"]

x-table-derivatives: &table_derivatives
  <<: *streaming
  command: ["python3", "-u", "eboard_table/eboard_table_derivatives.py"]

x-foreign: &foreign
  <<: *streaming
  command: ["python3", "-u", "eboard_foreign/eboard_foreign.py"]

x-indices: &indices
  <<: *streaming
  command: ["python3", "-u","-m", "indices.indices"]

x-alert: &alert
  build:
    context: ./alert_function
    dockerfile: Dockerfile
  networks: [appnet]
  restart: unless-stopped

x-alert-worker: &alert_worker
  <<: *alert
  image: alert_function:latest
  command: ["python3", "-u", "alert_function-worker.py"]
  volumes:
    - ./streaming/List:/app/streaming/List:ro
    - ./notify.py:/app/notify.py:ro  # 👈 thêm

x-db-writer: &db_writer
  build:
    context: ./db_writer
    dockerfile: Dockerfile
  image: db_writer:latest
  networks: [appnet]
  restart: unless-stopped
  volumes:                           # 👈 thêm
    - ./notify.py:/app/notify.py:ro # 👈 thêm

services:
  #---------------------------------------------EBOARD TABLE------------------------------------------------
  ebtb_cw:
    <<: *table_others
    container_name: ebtb_cw
    environment: { EBOARD_GROUP: "cw" }

  ebtb_etfhose:
    <<: *table_others
    container_name: ebtb_etfhose
    environment: { EBOARD_GROUP: "etfhose" }

  ebtb_hnxbond:
    <<: *table_others
    container_name: ebtb_hnxbond
    environment: { EBOARD_GROUP: "hnxbond" }

  ebtb_derivatives:
    <<: *table_derivatives
    container_name: ebtb_derivatives
    environment: { ALERT_FUNCTION_CHANNEL: "alert_function23" }

  # HOSE 1 → 10
  ebtb_hose1:  { <<: *table_exchange, container_name: ebtb_hose1,  environment: { EBOARD_GROUP: "hose1", ALERT_FUNCTION_CHANNEL: "alert_function1" } }
  ebtb_hose2:  { <<: *table_exchange, container_name: ebtb_hose2,  environment: { EBOARD_GROUP: "hose2", ALERT_FUNCTION_CHANNEL: "alert_function2" } }
  ebtb_hose3:  { <<: *table_exchange, container_name: ebtb_hose3,  environment: { EBOARD_GROUP: "hose3", ALERT_FUNCTION_CHANNEL: "alert_function3" } }
  ebtb_hose4:  { <<: *table_exchange, container_name: ebtb_hose4,  environment: { EBOARD_GROUP: "hose4", ALERT_FUNCTION_CHANNEL: "alert_function4" } }
  ebtb_hose5:  { <<: *table_exchange, container_name: ebtb_hose5,  environment: { EBOARD_GROUP: "hose5", ALERT_FUNCTION_CHANNEL: "alert_function5" } }
  ebtb_hose6:  { <<: *table_exchange, container_name: ebtb_hose6,  environment: { EBOARD_GROUP: "hose6", ALERT_FUNCTION_CHANNEL: "alert_function6" } }
  ebtb_hose7:  { <<: *table_exchange, container_name: ebtb_hose7,  environment: { EBOARD_GROUP: "hose7", ALERT_FUNCTION_CHANNEL: "alert_function7" } }
  ebtb_hose8:  { <<: *table_exchange, container_name: ebtb_hose8,  environment: { EBOARD_GROUP: "hose8", ALERT_FUNCTION_CHANNEL: "alert_function8" } }
  ebtb_hose9:  { <<: *table_exchange, container_name: ebtb_hose9,  environment: { EBOARD_GROUP: "hose9", ALERT_FUNCTION_CHANNEL: "alert_function9" } }
  ebtb_hose10: { <<: *table_exchange, container_name: ebtb_hose10, environment: { EBOARD_GROUP: "hose10", ALERT_FUNCTION_CHANNEL: "alert_function10" } }

  # HNX 1 → 8
  ebtb_hnx1: { <<: *table_exchange, container_name: ebtb_hnx1, environment: { EBOARD_GROUP: "hnx1", ALERT_FUNCTION_CHANNEL: "alert_function11" } }
  ebtb_hnx2: { <<: *table_exchange, container_name: ebtb_hnx2, environment: { EBOARD_GROUP: "hnx2", ALERT_FUNCTION_CHANNEL: "alert_function12" } }
  ebtb_hnx3: { <<: *table_exchange, container_name: ebtb_hnx3, environment: { EBOARD_GROUP: "hnx3", ALERT_FUNCTION_CHANNEL: "alert_function13" } }
  ebtb_hnx4: { <<: *table_exchange, container_name: ebtb_hnx4, environment: { EBOARD_GROUP: "hnx4", ALERT_FUNCTION_CHANNEL: "alert_function14" } }
  ebtb_hnx5: { <<: *table_exchange, container_name: ebtb_hnx5, environment: { EBOARD_GROUP: "hnx5", ALERT_FUNCTION_CHANNEL: "alert_function15" } }
  ebtb_hnx6: { <<: *table_exchange, container_name: ebtb_hnx6, environment: { EBOARD_GROUP: "hnx6", ALERT_FUNCTION_CHANNEL: "alert_function16" } }
  ebtb_hnx7: { <<: *table_exchange, container_name: ebtb_hnx7, environment: { EBOARD_GROUP: "hnx7", ALERT_FUNCTION_CHANNEL: "alert_function17" } }
  ebtb_hnx8: { <<: *table_exchange, container_name: ebtb_hnx8, environment: { EBOARD_GROUP: "hnx8", ALERT_FUNCTION_CHANNEL: "alert_function18" } }

  # UPCOM 1 → 4
  ebtb_upcom1: { <<: *table_exchange, container_name: ebtb_upcom1, environment: { EBOARD_GROUP: "upcom1", ALERT_FUNCTION_CHANNEL: "alert_function19" } }
  ebtb_upcom2: { <<: *table_exchange, container_name: ebtb_upcom2, environment: { EBOARD_GROUP: "upcom2", ALERT_FUNCTION_CHANNEL: "alert_function20" } }
  ebtb_upcom3: { <<: *table_exchange, container_name: ebtb_upcom3, environment: { EBOARD_GROUP: "upcom3", ALERT_FUNCTION_CHANNEL: "alert_function21" } }
  ebtb_upcom4: { <<: *table_exchange, container_name: ebtb_upcom4, environment: { EBOARD_GROUP: "upcom4", ALERT_FUNCTION_CHANNEL: "alert_function22" } }

  #---------------------------------------------EBOARD FOREIGN------------------------------------------------
  ebfr_cw:          { <<: *foreign, container_name: ebfr_cw,          environment: { EBOARD_GROUP: "cw" } }
  ebfr_derivatives: { <<: *foreign, container_name: ebfr_derivatives, environment: { EBOARD_GROUP: "derivatives" } }
  ebfr_etfhose:     { <<: *foreign, container_name: ebfr_etfhose,     environment: { EBOARD_GROUP: "etfhose" } }
  ebfr_hnxbond:     { <<: *foreign, container_name: ebfr_hnxbond,     environment: { EBOARD_GROUP: "hnxbond" } }

  ebfr_hose1:  { <<: *foreign, container_name: ebfr_hose1,  environment: { EBOARD_GROUP: "hose1" } }
  ebfr_hose2:  { <<: *foreign, container_name: ebfr_hose2,  environment: { EBOARD_GROUP: "hose2" } }
  ebfr_hose3:  { <<: *foreign, container_name: ebfr_hose3,  environment: { EBOARD_GROUP: "hose3" } }
  ebfr_hose4:  { <<: *foreign, container_name: ebfr_hose4,  environment: { EBOARD_GROUP: "hose4" } }
  ebfr_hose5:  { <<: *foreign, container_name: ebfr_hose5,  environment: { EBOARD_GROUP: "hose5" } }
  ebfr_hose6:  { <<: *foreign, container_name: ebfr_hose6,  environment: { EBOARD_GROUP: "hose6" } }
  ebfr_hose7:  { <<: *foreign, container_name: ebfr_hose7,  environment: { EBOARD_GROUP: "hose7" } }
  ebfr_hose8:  { <<: *foreign, container_name: ebfr_hose8,  environment: { EBOARD_GROUP: "hose8" } }
  ebfr_hose9:  { <<: *foreign, container_name: ebfr_hose9,  environment: { EBOARD_GROUP: "hose9" } }
  ebfr_hose10: { <<: *foreign, container_name: ebfr_hose10, environment: { EBOARD_GROUP: "hose10" } }

  ebfr_hnx1: { <<: *foreign, container_name: ebfr_hnx1, environment: { EBOARD_GROUP: "hnx1" } }
  ebfr_hnx2: { <<: *foreign, container_name: ebfr_hnx2, environment: { EBOARD_GROUP: "hnx2" } }
  ebfr_hnx3: { <<: *foreign, container_name: ebfr_hnx3, environment: { EBOARD_GROUP: "hnx3" } }
  ebfr_hnx4: { <<: *foreign, container_name: ebfr_hnx4, environment: { EBOARD_GROUP: "hnx4" } }
  ebfr_hnx5: { <<: *foreign, container_name: ebfr_hnx5, environment: { EBOARD_GROUP: "hnx5" } }
  ebfr_hnx6: { <<: *foreign, container_name: ebfr_hnx6, environment: { EBOARD_GROUP: "hnx6" } }
  ebfr_hnx7: { <<: *foreign, container_name: ebfr_hnx7, environment: { EBOARD_GROUP: "hnx7" } }
  ebfr_hnx8: { <<: *foreign, container_name: ebfr_hnx8, environment: { EBOARD_GROUP: "hnx8" } }

  ebfr_upcom1: { <<: *foreign, container_name: ebfr_upcom1, environment: { EBOARD_GROUP: "upcom1" } }
  ebfr_upcom2: { <<: *foreign, container_name: ebfr_upcom2, environment: { EBOARD_GROUP: "upcom2" } }
  ebfr_upcom3: { <<: *foreign, container_name: ebfr_upcom3, environment: { EBOARD_GROUP: "upcom3" } }
  ebfr_upcom4: { <<: *foreign, container_name: ebfr_upcom4, environment: { EBOARD_GROUP: "upcom4" } }

  #---------------------------------------------INDICES------------------------------------------------
  indices1: { <<: *indices, container_name: indices1, environment: { INDICES_GROUP: "indices1" } }
  indices2: { <<: *indices, container_name: indices2, environment: { INDICES_GROUP: "indices2" } }
  indices3: { <<: *indices, container_name: indices3, environment: { INDICES_GROUP: "indices3" } }
  indices4: { <<: *indices, container_name: indices4, environment: { INDICES_GROUP: "indices4" } }
  indices5: { <<: *indices, container_name: indices5, environment: { INDICES_GROUP: "indices5" } }

  #---------------------------------------------ALERT_FUNCTION------------------------------------------------
  alert_function1:  { <<: *alert_worker, container_name: alert_function1,  environment: { ALERT_INPUT_CHANNEL: "alert_function1", PRELOAD_GROUP: "hose1" } }
  alert_function2:  { <<: *alert_worker, container_name: alert_function2,  environment: { ALERT_INPUT_CHANNEL: "alert_function2", PRELOAD_GROUP: "hose2" } }
  alert_function3:  { <<: *alert_worker, container_name: alert_function3,  environment: { ALERT_INPUT_CHANNEL: "alert_function3", PRELOAD_GROUP: "hose3" } }
  alert_function4:  { <<: *alert_worker, container_name: alert_function4,  environment: { ALERT_INPUT_CHANNEL: "alert_function4", PRELOAD_GROUP: "hose4" } }
  alert_function5:  { <<: *alert_worker, container_name: alert_function5,  environment: { ALERT_INPUT_CHANNEL: "alert_function5", PRELOAD_GROUP: "hose5" } }
  alert_function6:  { <<: *alert_worker, container_name: alert_function6,  environment: { ALERT_INPUT_CHANNEL: "alert_function6", PRELOAD_GROUP: "hose6" } }
  alert_function7:  { <<: *alert_worker, container_name: alert_function7,  environment: { ALERT_INPUT_CHANNEL: "alert_function7", PRELOAD_GROUP: "hose7" } }
  alert_function8:  { <<: *alert_worker, container_name: alert_function8,  environment: { ALERT_INPUT_CHANNEL: "alert_function8", PRELOAD_GROUP: "hose8" } }
  alert_function9:  { <<: *alert_worker, container_name: alert_function9,  environment: { ALERT_INPUT_CHANNEL: "alert_function9", PRELOAD_GROUP: "hose9" } }
  alert_function10: { <<: *alert_worker, container_name: alert_function10, environment: { ALERT_INPUT_CHANNEL: "alert_function10", PRELOAD_GROUP: "hose10" } }
  alert_function11: { <<: *alert_worker, container_name: alert_function11, environment: { ALERT_INPUT_CHANNEL: "alert_function11", PRELOAD_GROUP: "hnx1" } }
  alert_function12: { <<: *alert_worker, container_name: alert_function12, environment: { ALERT_INPUT_CHANNEL: "alert_function12", PRELOAD_GROUP: "hnx2" } }
  alert_function13: { <<: *alert_worker, container_name: alert_function13, environment: { ALERT_INPUT_CHANNEL: "alert_function13", PRELOAD_GROUP: "hnx3" } }
  alert_function14: { <<: *alert_worker, container_name: alert_function14, environment: { ALERT_INPUT_CHANNEL: "alert_function14", PRELOAD_GROUP: "hnx4" } }
  alert_function15: { <<: *alert_worker, container_name: alert_function15, environment: { ALERT_INPUT_CHANNEL: "alert_function15", PRELOAD_GROUP: "hnx5" } }
  alert_function16: { <<: *alert_worker, container_name: alert_function16, environment: { ALERT_INPUT_CHANNEL: "alert_function16", PRELOAD_GROUP: "hnx6" } }
  alert_function17: { <<: *alert_worker, container_name: alert_function17, environment: { ALERT_INPUT_CHANNEL: "alert_function17", PRELOAD_GROUP: "hnx7" } }
  alert_function18: { <<: *alert_worker, container_name: alert_function18, environment: { ALERT_INPUT_CHANNEL: "alert_function18", PRELOAD_GROUP: "hnx8" } }
  alert_function19: { <<: *alert_worker, container_name: alert_function19, environment: { ALERT_INPUT_CHANNEL: "alert_function19", PRELOAD_GROUP: "upcom1" } }
  alert_function20: { <<: *alert_worker, container_name: alert_function20, environment: { ALERT_INPUT_CHANNEL: "alert_function20", PRELOAD_GROUP: "upcom2" } }
  alert_function21: { <<: *alert_worker, container_name: alert_function21, environment: { ALERT_INPUT_CHANNEL: "alert_function21", PRELOAD_GROUP: "upcom3" } }
  alert_function22: { <<: *alert_worker, container_name: alert_function22, environment: { ALERT_INPUT_CHANNEL: "alert_function22", PRELOAD_GROUP: "upcom4" } }
  alert_function23: { <<: *alert_worker, container_name: alert_function23, environment: { ALERT_INPUT_CHANNEL: "alert_function23", PRELOAD_GROUP: "derivatives" } }

  alert_webhook:
    <<: *alert
    image: alert_webhook:latest
    container_name: alert_webhook
    command: ["python3", "-u", "alert_webhook.py"]

  #---------------------------------------------DB_WRITER------------------------------------------------

  db_writer:
    <<: *db_writer
    container_name: db_writer
    command: ["python3", "-u", "db_writer.py"]

networks:
  appnet:
    driver: bridge
